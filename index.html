

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Beauty · Halle (Saale)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400\&family=Jost:wght@300;400;500;600\&display=swap" rel="stylesheet">
<style>

&#x20; :root{

&#x20;   --bg:#f4e9d8;

&#x20;   --panel:#ece0c9;

&#x20;   --panel-2:#e3d3b6;

&#x20;   --gold:#a8783f;

&#x20;   --gold-deep:#8a6a44;

&#x20;   --gold-soft:#6b4a28;

&#x20;   --cream:#2b2117;

&#x20;   --line:#d9c5a3;

&#x20;   --muted:#7d6a51;

&#x20; }

&#x20; \*{margin:0;padding:0;box-sizing:border-box;}

&#x20; html{scroll-behavior:smooth;background:#f4e9d8;color-scheme:light;}

&#x20; body{

&#x20;   background:var(--bg);

&#x20;   color:var(--cream);

&#x20;   font-family:'Jost',sans-serif;

&#x20;   font-weight:300;

&#x20;   overflow-x:hidden;

&#x20; }

&#x20; ::selection{background:var(--gold-deep);color:var(--cream);}



&#x20; h1,h2,h3{

&#x20;   font-family:'Cormorant Garamond',serif;

&#x20;   font-weight:400;

&#x20;   color:var(--cream);

&#x20;   letter-spacing:0.01em;

&#x20; }



&#x20; .eyebrow{

&#x20;   font-family:'Jost',sans-serif;

&#x20;   font-size:0.72rem;

&#x20;   letter-spacing:0.35em;

&#x20;   text-transform:uppercase;

&#x20;   color:var(--gold);

&#x20; }



&#x20; a{color:inherit;text-decoration:none;}



&#x20; /\* ---------- NAV ---------- \*/

&#x20; nav{

&#x20;   position:fixed;top:0;left:0;right:0;

&#x20;   display:flex;justify-content:space-between;align-items:center;

&#x20;   padding:1rem 6vw;

&#x20;   z-index:100;

&#x20;   background:linear-gradient(to bottom, rgba(244,233,216,0.97) 60%, transparent);

&#x20; }

&#x20; .nav-mark{display:flex;align-items:center;gap:0.6rem;}

&#x20; .nav-mark span{

&#x20;   font-family:'Cormorant Garamond',serif;

&#x20;   font-size:1.1rem;

&#x20;   letter-spacing:0.25em;

&#x20;   text-transform:uppercase;

&#x20; }

&#x20; .nav-links{display:flex;gap:2.4rem;font-size:0.85rem;letter-spacing:0.08em;}

&#x20; .nav-links a{opacity:0.75;transition:opacity 0.3s, color 0.3s;}

&#x20; .nav-links a:hover{opacity:1;color:var(--gold);}

&#x20; @media(max-width:720px){.nav-links{display:none;}}



&#x20; /\* ---------- HERO ---------- \*/

&#x20; .hero{

&#x20;   min-height:100svh;

&#x20;   display:flex;

&#x20;   flex-direction:column;

&#x20;   align-items:center;

&#x20;   justify-content:center;

&#x20;   text-align:center;

&#x20;   padding:6rem 6vw 4rem;

&#x20;   position:relative;

&#x20;   overflow:hidden;

&#x20;   background:

&#x20;     radial-gradient(ellipse at 50% 0%, rgba(201,162,106,0.10), transparent 60%),

&#x20;     var(--bg);

&#x20; }

&#x20; .hero > \*{position:relative;z-index:1;}

&#x20; .nav-logo-img{

&#x20;   width:54px;height:54px;

&#x20;   border-radius:50%;

&#x20;   object-fit:cover;

&#x20;   border:1.5px solid var(--gold-deep);

&#x20;   box-shadow:0 4px 14px rgba(0,0,0,0.15);

&#x20; }

&#x20; .hero-logo-img{

&#x20;   width:min(200px, 42vw);

&#x20;   height:min(200px, 42vw);

&#x20;   object-fit:cover;

&#x20;   border-radius:50%;

&#x20;   border:1px solid var(--gold);

&#x20;   margin-bottom:2rem;

&#x20;   box-shadow:0 0 0 6px rgba(201,162,106,0.08);

&#x20;   opacity:0;

&#x20;   animation:logoReveal 1.4s ease forwards 0.2s;

&#x20; }

&#x20; @keyframes logoReveal{

&#x20;   from{opacity:0; transform:scale(0.92);}

&#x20;   to{opacity:1; transform:scale(1);}

&#x20; }



&#x20; .logo-mark{

&#x20;   width:min(220px, 40vw);

&#x20;   height:min(220px, 40vw);

&#x20;   margin-bottom:2rem;

&#x20; }

&#x20; .logo-mark circle, .logo-mark path{

&#x20;   fill:none;

&#x20;   stroke:var(--gold);

&#x20;   stroke-width:1.1;

&#x20;   stroke-linecap:round;

&#x20;   stroke-linejoin:round;

&#x20; }

&#x20; .logo-mark .draw{

&#x20;   stroke-dasharray:1000;

&#x20;   stroke-dashoffset:1000;

&#x20;   animation:draw 2.6s ease forwards 0.3s;

&#x20; }

&#x20; .logo-mark .fill-lash{

&#x20;   fill:var(--gold);

&#x20;   stroke:none;

&#x20;   opacity:0;

&#x20;   animation:fadeIn 1s ease forwards 2.4s;

&#x20; }

&#x20; @keyframes draw{to{stroke-dashoffset:0;}}

&#x20; @keyframes fadeIn{to{opacity:1;}}



&#x20; .hero h1{

&#x20;   font-size:clamp(2.6rem, 7vw, 4.6rem);

&#x20;   letter-spacing:0.14em;

&#x20;   text-transform:uppercase;

&#x20;   line-height:1.05;

&#x20; }

&#x20; .hero .sub{

&#x20;   font-family:'Cormorant Garamond',serif;

&#x20;   font-style:italic;

&#x20;   font-size:clamp(1.05rem,2vw,1.35rem);

&#x20;   color:var(--gold-soft);

&#x20;   margin-top:0.9rem;

&#x20;   letter-spacing:0.02em;

&#x20; }

&#x20; .hero-loc{

&#x20;   margin-top:1.6rem;

&#x20;   font-size:0.78rem;

&#x20;   letter-spacing:0.3em;

&#x20;   text-transform:uppercase;

&#x20;   color:var(--muted);

&#x20; }

&#x20; .hero-loc::before, .hero-loc::after{content:"—";margin:0 0.8em;color:var(--gold-deep);}



&#x20; .scroll-cue{

&#x20;   position:absolute;

&#x20;   bottom:2.4rem;left:50%;

&#x20;   transform:translateX(-50%);

&#x20;   width:1px;height:52px;

&#x20;   background:linear-gradient(to bottom, transparent, var(--gold), transparent);

&#x20;   overflow:hidden;

&#x20; }

&#x20; .scroll-cue::after{

&#x20;   content:"";position:absolute;left:0;top:-100%;

&#x20;   width:100%;height:100%;

&#x20;   background:#fffaf1;

&#x20;   animation:slide 2.2s ease-in-out infinite;

&#x20; }

&#x20; @keyframes slide{to{top:100%;}}



&#x20; /\* ---------- SECTION SHELL ---------- \*/

&#x20; section{padding:7rem 6vw;position:relative;}

&#x20; .section-head{

&#x20;   text-align:center;

&#x20;   max-width:640px;

&#x20;   margin:0 auto 3.6rem;

&#x20; }

&#x20; .section-head h2{

&#x20;   font-size:clamp(2rem,4.5vw,2.9rem);

&#x20;   margin-top:0.6rem;

&#x20; }

&#x20; .section-head p{

&#x20;   color:var(--muted);

&#x20;   font-size:0.95rem;

&#x20;   line-height:1.7;

&#x20;   margin-top:1rem;

&#x20; }

&#x20; .divider{

&#x20;   width:64px;height:1px;

&#x20;   background:var(--gold-deep);

&#x20;   margin:0 auto;

&#x20; }



&#x20; /\* ---------- PHILOSOPHY ---------- \*/

&#x20; .philosophy{

&#x20;   background:var(--panel);

&#x20;   border-top:1px solid var(--line);

&#x20;   border-bottom:1px solid var(--line);

&#x20; }

&#x20; .philosophy-grid{

&#x20;   max-width:1000px;margin:0 auto;

&#x20;   display:grid;grid-template-columns:repeat(3,1fr);gap:3rem;

&#x20;   text-align:center;

&#x20; }

&#x20; .philosophy-grid .item .num{

&#x20;   font-family:'Cormorant Garamond',serif;

&#x20;   font-size:2.6rem;color:var(--gold-deep);

&#x20;   display:block;margin-bottom:0.6rem;

&#x20; }

&#x20; .philosophy-grid h3{font-size:1.3rem;margin-bottom:0.6rem;}

&#x20; .philosophy-grid p{font-size:0.88rem;color:var(--muted);line-height:1.7;}

&#x20; @media(max-width:760px){.philosophy-grid{grid-template-columns:1fr;gap:2.4rem;}}



&#x20; /\* ---------- MENU / LEISTUNGEN ---------- \*/

&#x20; .menu-block{max-width:820px;margin:0 auto 4.4rem;}

&#x20; .menu-block:last-child{margin-bottom:0;}

&#x20; .menu-title{

&#x20;   display:flex;align-items:baseline;gap:1rem;

&#x20;   margin-bottom:1.6rem;

&#x20; }

&#x20; .menu-title .index{

&#x20;   font-family:'Cormorant Garamond',serif;

&#x20;   font-style:italic;

&#x20;   color:var(--gold-deep);

&#x20;   font-size:1rem;

&#x20; }

&#x20; .menu-title h3{font-size:1.5rem;letter-spacing:0.04em;}

&#x20; .menu-row{

&#x20;   display:flex;justify-content:space-between;align-items:baseline;

&#x20;   gap:1.2rem;

&#x20;   padding:1.05rem 0;

&#x20;   border-bottom:1px solid var(--line);

&#x20; }

&#x20; .menu-row .name{font-size:1rem;color:var(--cream);}

&#x20; .menu-row .desc{display:block;font-size:0.8rem;color:var(--muted);margin-top:0.25rem;}

&#x20; .menu-row .dots{

&#x20;   flex:1;

&#x20;   border-bottom:1px dotted var(--line);

&#x20;   margin:0 0.4rem;

&#x20;   transform:translateY(-0.4em);

&#x20; }

&#x20; .menu-row .price{

&#x20;   font-family:'Cormorant Garamond',serif;

&#x20;   font-size:1.15rem;

&#x20;   color:var(--gold);

&#x20;   white-space:nowrap;

&#x20; }

&#x20; .menu-row.highlight{

&#x20;   background:linear-gradient(90deg, rgba(201,162,106,0.06), transparent);

&#x20;   padding-left:1rem; padding-right:1rem;

&#x20;   margin:0.2rem -1rem;

&#x20;   border-bottom:1px solid var(--gold-deep);

&#x20; }

&#x20; .badge{

&#x20;   display:inline-block;

&#x20;   font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;

&#x20;   color:var(--bg);background:var(--gold);

&#x20;   padding:0.2em 0.6em;border-radius:2px;

&#x20;   margin-left:0.6em;transform:translateY(-2px);

&#x20; }



&#x20; .welcome-strip{

&#x20;   max-width:820px;margin:0 auto 3.6rem;

&#x20;   display:flex;align-items:center;gap:1rem;

&#x20;   border:1px solid var(--gold-deep);

&#x20;   padding:1.1rem 1.4rem;

&#x20;   font-size:0.85rem;color:var(--gold-soft);

&#x20; }

&#x20; .welcome-strip .icon{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--gold);}



&#x20; /\* ---------- STUDIO ---------- \*/

&#x20; .studio{

&#x20;   display:grid;grid-template-columns:1fr 1fr;gap:4rem;

&#x20;   max-width:1080px;margin:0 auto;

&#x20;   align-items:center;

&#x20; }

&#x20; .studio-visual{

&#x20;   aspect-ratio:4/5;

&#x20;   border:1px solid var(--line);

&#x20;   display:flex;align-items:center;justify-content:center;

&#x20;   position:relative;

&#x20;   background:

&#x20;     radial-gradient(circle at 30% 20%, rgba(201,162,106,0.14), transparent 55%),

&#x20;     var(--panel-2);

&#x20; }

&#x20; .studio-visual .ring{

&#x20;   width:62%;aspect-ratio:1;border-radius:50%;

&#x20;   border:1px solid var(--gold-deep);

&#x20;   display:flex;align-items:center;justify-content:center;

&#x20; }

&#x20; .studio-visual .ring2{

&#x20;   width:78%;aspect-ratio:1;border-radius:50%;

&#x20;   border:1px solid var(--gold);

&#x20;   display:flex;align-items:center;justify-content:center;

&#x20;   font-family:'Cormorant Garamond',serif;font-style:italic;

&#x20;   font-size:0.95rem;color:var(--gold-soft);text-align:center;

&#x20;   letter-spacing:0.05em;

&#x20; }

&#x20; .studio h2{font-size:clamp(1.8rem,3.6vw,2.5rem);margin-bottom:1.2rem;}

&#x20; .studio p{color:var(--muted);font-size:0.95rem;line-height:1.85;margin-bottom:1rem;}

&#x20; .studio ul{list-style:none;margin-top:1.6rem;}

&#x20; .studio li{

&#x20;   font-size:0.88rem;color:var(--cream);

&#x20;   padding:0.7rem 0;border-top:1px solid var(--line);

&#x20;   display:flex;justify-content:space-between;

&#x20; }

&#x20; .studio li span:last-child{color:var(--gold-soft);}

&#x20; @media(max-width:800px){.studio{grid-template-columns:1fr;gap:2.4rem;}}



&#x20; /\* ---------- CTA / BOOKING ---------- \*/

&#x20; .cta{

&#x20;   background:var(--panel);

&#x20;   border-top:1px solid var(--line);

&#x20;   text-align:center;

&#x20; }

&#x20; .cta h2{font-size:clamp(2rem,5vw,3rem);}

&#x20; .cta p{color:var(--muted);max-width:520px;margin:1.2rem auto 2.4rem;line-height:1.8;font-size:0.95rem;}

&#x20; .cta-buttons{display:flex;gap:1.2rem;justify-content:center;flex-wrap:wrap;}

&#x20; .icon-btn{display:inline-flex;align-items:center;gap:0.6em;}

&#x20; .btn-icon{width:1.4em;height:1.4em;flex-shrink:0;}

&#x20; .btn{

&#x20;   padding:1rem 2.2rem;

&#x20;   font-size:0.8rem;letter-spacing:0.18em;text-transform:uppercase;

&#x20;   border:1px solid var(--gold);

&#x20;   transition:background 0.35s, color 0.35s;

&#x20; }

&#x20; .btn.primary{background:var(--gold);color:var(--bg);}

&#x20; .btn.primary:hover{background:transparent;color:var(--gold);}

&#x20; .btn.ghost{color:var(--gold-soft);}

&#x20; .btn.ghost:hover{background:var(--gold);color:var(--bg);}



&#x20; /\* ---------- FOOTER ---------- \*/

&#x20; footer{

&#x20;   padding:3rem 6vw 2.4rem;

&#x20;   display:flex;justify-content:space-between;align-items:center;

&#x20;   flex-wrap:wrap;gap:1rem;

&#x20;   font-size:0.78rem;color:var(--muted);

&#x20;   border-top:1px solid var(--line);

&#x20; }

&#x20; footer a{color:var(--gold-soft);}

&#x20; footer a:hover{color:var(--gold);}



&#x20; /\* ---------- REVEAL ---------- \*/

&#x20; .reveal{opacity:0;transform:translateY(24px);transition:opacity 0.9s ease, transform 0.9s ease;}

&#x20; .reveal.in{opacity:1;transform:translateY(0);}



&#x20; @media (prefers-reduced-motion: reduce){

&#x20;   .reveal, .logo-mark .draw, .logo-mark .fill-lash, .scroll-cue::after{

&#x20;     animation:none !important; transition:none !important; opacity:1 !important; transform:none !important; stroke-dashoffset:0 !important;

&#x20;   }

&#x20; }

</head>
